services:
  git-file-console:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    volumes:
      - ./data:/app/data
    environment:
      PORT: "8090"
      APP_SESSION_SECRET: "abcdef123456"
      APP_USERS_PATH: "/app/data/users.json"
    restart: unless-stopped
